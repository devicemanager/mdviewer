<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- SECURITY: local-only by default. No remote scripts/styles/images/connections.
         'wasm-unsafe-eval' is required by Shiki's oniguruma WASM engine. Remote
         images are intentionally excluded from img-src (Phase 3 adds an opt-in). -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' mdviewer-local: data:; font-src 'self' mdviewer-local: data:; connect-src 'self' mdviewer-local:; base-uri 'none'; form-action 'none'; object-src 'none'; frame-src 'none'">
    <title>MDViewer</title>

    <!-- Vendor: KaTeX -->
    <link rel="stylesheet" href="vendor/katex.min.css">
    <!-- Base styles -->
    <link rel="stylesheet" href="mdviewer-base.css">
    <!-- Theme (swapped at runtime) -->
    <link rel="stylesheet" href="themes/github-light.css" id="theme-css">

    <script src="vendor/marked.min.js"></script>
    <script src="vendor/shiki.bundle.js"></script>
    <script src="vendor/katex.min.js"></script>
    <script src="vendor/mermaid.min.js"></script>
    <script src="vendor/dompurify.min.js"></script>
    <script src="mdviewer.js"></script>
</head>
<body>
    <div id="content"></div>
</body>
</html>
